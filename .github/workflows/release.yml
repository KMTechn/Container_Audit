name: Create GitHub Release for Container_Audit

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Compile Python sources
        run: python -m compileall -q .

      - name: Run tests
        run: python -m pytest -q -p no:cacheprovider

      - name: Check release version
        run: python tools/check_release_version.py --tag "${{ github.ref_name }}"

      - name: Prepare release config
        shell: pwsh
        env:
          PRIVATE_UPDATE_MANIFEST_URL: ${{ vars.PRIVATE_UPDATE_MANIFEST_URL }}
          PRIVATE_UPDATE_MANIFEST_SIGNATURE_URL: ${{ vars.PRIVATE_UPDATE_MANIFEST_SIGNATURE_URL }}
          PRIVATE_UPDATE_MANIFEST_PUBLIC_KEY: ${{ vars.PRIVATE_UPDATE_MANIFEST_PUBLIC_KEY }}
          PRIVATE_UPDATE_CHANNEL: ${{ vars.PRIVATE_UPDATE_CHANNEL }}
        run: |
          Remove-Item -LiteralPath build/release_config -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path build/release_config | Out-Null
          Copy-Item -LiteralPath config/container_audit_settings.json -Destination build/release_config/container_audit_settings.json
          $settingsPath = "build/release_config/container_audit_settings.json"
          $settings = Get-Content -Raw -Encoding UTF8 -LiteralPath $settingsPath | ConvertFrom-Json
          $channel = if ([string]::IsNullOrWhiteSpace($env:PRIVATE_UPDATE_CHANNEL)) { "stable" } else { $env:PRIVATE_UPDATE_CHANNEL.Trim() }
          if (-not [string]::IsNullOrWhiteSpace($env:PRIVATE_UPDATE_MANIFEST_URL) -or -not [string]::IsNullOrWhiteSpace($env:PRIVATE_UPDATE_MANIFEST_PUBLIC_KEY)) {
            if ([string]::IsNullOrWhiteSpace($env:PRIVATE_UPDATE_MANIFEST_URL) -or [string]::IsNullOrWhiteSpace($env:PRIVATE_UPDATE_MANIFEST_PUBLIC_KEY)) {
              throw "PRIVATE_UPDATE_MANIFEST_URL and PRIVATE_UPDATE_MANIFEST_PUBLIC_KEY must be set together."
            }
            $updateSettings = [ordered]@{
              provider = "private_manifest"
              manifest_url = $env:PRIVATE_UPDATE_MANIFEST_URL.Trim()
              manifest_public_key = $env:PRIVATE_UPDATE_MANIFEST_PUBLIC_KEY.Trim()
              channel = $channel
            }
            if (-not [string]::IsNullOrWhiteSpace($env:PRIVATE_UPDATE_MANIFEST_SIGNATURE_URL)) {
              $updateSettings.manifest_signature_url = $env:PRIVATE_UPDATE_MANIFEST_SIGNATURE_URL.Trim()
            }
          } else {
            $updateSettings = [ordered]@{
              provider = "github"
              channel = $channel
            }
          }
          $settings | Add-Member -NotePropertyName update_settings -NotePropertyValue ([pscustomobject]$updateSettings) -Force
          $settings | ConvertTo-Json -Depth 10 | Set-Content -Encoding utf8NoBOM -LiteralPath $settingsPath
          python tools/check_release_config.py --config-dir build/release_config

      - name: Prepare release tools
        shell: pwsh
        run: |
          Remove-Item -LiteralPath build/release_tools -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path build/release_tools | Out-Null
          Copy-Item -LiteralPath tools/direct_sync_relay_runner.py -Destination build/release_tools/direct_sync_relay_runner.py
          Copy-Item -LiteralPath tools/direct_sync_relay_install_pack.py -Destination build/release_tools/direct_sync_relay_install_pack.py
          Copy-Item -LiteralPath tools/direct_sync_relay_operator.py -Destination build/release_tools/direct_sync_relay_operator.py
          Copy-Item -LiteralPath tools/register_container_audit_worker_pc.py -Destination build/release_tools/register_container_audit_worker_pc.py

      - name: Build with PyInstaller (One-Folder mode)
        # 아이콘 지정 및 hidden-import 옵션을 포함한 최종 명령어
        run: python -m PyInstaller --name "Container_Audit" --onedir --windowed --contents-directory "." --icon="assets/logo.ico" --add-data "assets;assets" --add-data "build/release_config;config" --add-data "build/release_tools;tools" --add-data "direct_sync_push.py;." --add-data "direct_sync_runtime.py;." --add-data "direct_sync_operator.py;." --add-data "storage_policy.py;." --add-data "storage_utils.py;." --hidden-import pygame --hidden-import PIL.Image --hidden-import PIL.ImageTk Container_Audit.py

      - name: Build bundled direct-sync relay executable
        run: python -m PyInstaller --name "Container_Audit_DirectSync_Relay" --onefile --console --distpath dist/Container_Audit --workpath build/direct_sync_relay_pyinstaller --specpath build/direct_sync_relay_pyinstaller tools/direct_sync_relay_runner.py

      - name: Build bundled direct-sync install executable
        run: python -m PyInstaller --name "Container_Audit_DirectSync_Install" --onefile --console --distpath dist/Container_Audit --workpath build/direct_sync_install_pyinstaller --specpath build/direct_sync_install_pyinstaller tools/direct_sync_relay_install_pack.py

      - name: Build bundled worker-PC registration executable
        run: python -m PyInstaller --name "Container_Audit_Worker_PC_Register" --onefile --console --distpath dist/Container_Audit --workpath build/worker_pc_register_pyinstaller --specpath build/worker_pc_register_pyinstaller tools/register_container_audit_worker_pc.py

      - name: Zip the build folder
        run: |
          Compress-Archive -Path dist/Container_Audit -DestinationPath "Container_Audit-${{ github.ref_name }}.zip"

      - name: Smoke check release archive
        shell: pwsh
        run: |
          $zipPath = "Container_Audit-${{ github.ref_name }}.zip"
          $smokeDir = Join-Path $env:RUNNER_TEMP "container-audit-release-smoke"
          Remove-Item -LiteralPath $smokeDir -Recurse -Force -ErrorAction SilentlyContinue
          python tools/check_update_archive.py --zip-path "$zipPath" --destination "$smokeDir"
          $required = @(
            "Container_Audit/Container_Audit.exe",
            "Container_Audit/assets/Item.csv",
            "Container_Audit/assets/logo.ico",
            "Container_Audit/assets/logo.png",
            "Container_Audit/assets/success.wav",
            "Container_Audit/assets/error.wav",
            "Container_Audit/assets/KMC_LHD.png",
            "Container_Audit/assets/KMC_RHD.png",
            "Container_Audit/assets/HMC_LHD_RHD.png",
            "Container_Audit/config/container_audit_settings.json",
            "Container_Audit/tools/direct_sync_relay_runner.py",
            "Container_Audit/tools/direct_sync_relay_install_pack.py",
            "Container_Audit/tools/direct_sync_relay_operator.py",
            "Container_Audit/tools/register_container_audit_worker_pc.py",
            "Container_Audit/Container_Audit_DirectSync_Install.exe",
            "Container_Audit/Container_Audit_DirectSync_Relay.exe",
            "Container_Audit/Container_Audit_Worker_PC_Register.exe",
            "Container_Audit/direct_sync_push.py",
            "Container_Audit/direct_sync_runtime.py",
            "Container_Audit/direct_sync_operator.py",
            "Container_Audit/storage_policy.py",
            "Container_Audit/storage_utils.py"
          )
          foreach ($relative in $required) {
            $candidate = Join-Path $smokeDir $relative
            if (-not (Test-Path -LiteralPath $candidate)) {
              throw "Missing release asset: $relative"
            }
          }
          $releaseConfigDir = Join-Path $smokeDir "Container_Audit/config"
          python tools/check_release_config.py --config-dir "$releaseConfigDir"
          $hash = Get-FileHash -LiteralPath $zipPath -Algorithm SHA256
          "$($hash.Hash)  $zipPath" | Set-Content -LiteralPath "$zipPath.sha256" -Encoding ascii
          $zipInfo = Get-Item -LiteralPath $zipPath
          if (-not [string]::IsNullOrWhiteSpace("${{ vars.PRIVATE_UPDATE_ARTIFACT_BASE_URL }}")) {
            $manifestPath = "Container_Audit-${{ github.ref_name }}.manifest.json"
            $baseUrl = "${{ vars.PRIVATE_UPDATE_ARTIFACT_BASE_URL }}".Trim().TrimEnd("/")
            $rolloutPercentageRaw = "${{ vars.PRIVATE_UPDATE_ROLLOUT_PERCENTAGE }}"
            $baseUri = [System.Uri]$baseUrl
            if ($baseUri.Scheme -ne "https") {
              throw "PRIVATE_UPDATE_ARTIFACT_BASE_URL must use HTTPS."
            }
            if (-not [string]::IsNullOrWhiteSpace($baseUri.UserInfo)) {
              throw "PRIVATE_UPDATE_ARTIFACT_BASE_URL must not include userinfo."
            }
            if (-not [string]::IsNullOrWhiteSpace($baseUri.Fragment)) {
              throw "PRIVATE_UPDATE_ARTIFACT_BASE_URL must not include fragments."
            }
            if (-not [string]::IsNullOrWhiteSpace($baseUri.Query)) {
              throw "PRIVATE_UPDATE_ARTIFACT_BASE_URL must not contain query strings."
            }
            $blockedHosts = @("github.com", "www.github.com", "api.github.com", "objects.githubusercontent.com", "github-releases.githubusercontent.com")
            $artifactHost = $baseUri.Host.ToLowerInvariant()
            if ($blockedHosts -contains $artifactHost -or $artifactHost.EndsWith(".githubusercontent.com")) {
              throw "PRIVATE_UPDATE_ARTIFACT_BASE_URL must point to the private update artifact host, not GitHub release storage."
            }
            $rolloutPercentage = 100
            if (-not [string]::IsNullOrWhiteSpace($rolloutPercentageRaw)) {
              $rolloutPercentage = [int]$rolloutPercentageRaw
            }
            if ($rolloutPercentage -lt 0 -or $rolloutPercentage -gt 100) {
              throw "PRIVATE_UPDATE_ROLLOUT_PERCENTAGE must be an integer from 0 to 100."
            }
            $artifactUrl = "$baseUrl/$zipPath"
            $manifest = [ordered]@{
              schema_version = "kmtech-private-update-manifest-v1"
              manifest_version = 1
              app_id = "Container_Audit"
              package_id = "Container_Audit"
              channel = "stable"
              version = "${{ github.ref_name }}"
              artifact = [ordered]@{
                name = $zipPath
                url = $artifactUrl
                size_bytes = $zipInfo.Length
                sha256 = $hash.Hash.ToLowerInvariant()
                legacy_sha256_url = "$artifactUrl.sha256"
              }
              archive = [ordered]@{
                format = "zip"
                pyinstaller_layout = "onedir"
                top_level = "Container_Audit"
                entrypoint = "Container_Audit.exe"
                required_files = $required
                deny_runtime_state = $true
              }
              install = [ordered]@{
                strategy = "robocopy_backup_then_mirror"
                preserve_paths = @("config/container_audit_settings.json")
                restart_executable = "Container_Audit.exe"
              }
              rollout = [ordered]@{
                percentage = $rolloutPercentage
                allow_pc_ids = @()
                deny_pc_ids = @()
              }
            }
            $manifest | ConvertTo-Json -Depth 8 | Set-Content -Encoding utf8NoBOM $manifestPath
          }

      - name: Sign private update manifest
        if: ${{ vars.PRIVATE_UPDATE_ARTIFACT_BASE_URL != '' }}
        shell: pwsh
        env:
          PRIVATE_UPDATE_MANIFEST_SIGNING_KEY: ${{ secrets.PRIVATE_UPDATE_MANIFEST_SIGNING_KEY }}
          PRIVATE_UPDATE_MANIFEST_PATH: Container_Audit-${{ github.ref_name }}.manifest.json
        run: |
          if ([string]::IsNullOrWhiteSpace($env:PRIVATE_UPDATE_MANIFEST_SIGNING_KEY)) {
            throw "PRIVATE_UPDATE_MANIFEST_SIGNING_KEY secret is required."
          }
          if (-not (Test-Path -LiteralPath $env:PRIVATE_UPDATE_MANIFEST_PATH)) {
            throw "Private update manifest not found: $env:PRIVATE_UPDATE_MANIFEST_PATH"
          }
          $script = @'
          import base64
          import json
          import os
          from pathlib import Path
          from cryptography.hazmat.primitives.asymmetric.ed25519 import Ed25519PrivateKey

          key_text = os.environ["PRIVATE_UPDATE_MANIFEST_SIGNING_KEY"].strip()
          try:
              key_bytes = bytes.fromhex(key_text)
          except ValueError:
              key_bytes = base64.b64decode(key_text, validate=True)
          if len(key_bytes) != 32:
              raise SystemExit("PRIVATE_UPDATE_MANIFEST_SIGNING_KEY must decode to 32 bytes")

          manifest_path = Path(os.environ["PRIVATE_UPDATE_MANIFEST_PATH"])
          manifest = json.loads(manifest_path.read_text(encoding="utf-8-sig"))
          canonical = json.dumps(manifest, sort_keys=True, separators=(",", ":"), ensure_ascii=True).encode("utf-8")
          signature = Ed25519PrivateKey.from_private_bytes(key_bytes).sign(canonical)
          manifest_path.with_name(manifest_path.name + ".sig").write_bytes(signature)
          '@
          $script | python -
          $sigPath = "$env:PRIVATE_UPDATE_MANIFEST_PATH.sig"
          $sig = [System.IO.File]::ReadAllBytes($sigPath)
          if ($sig.Length -ne 64) {
            throw "Private update manifest signature must be 64 bytes."
          }

      - name: Publish private update feed
        if: ${{ vars.PRIVATE_UPDATE_ARTIFACT_BASE_URL != '' }}
        shell: pwsh
        env:
          COMPANY_UPDATE_SSH_HOST: ${{ secrets.COMPANY_UPDATE_SSH_HOST }}
          COMPANY_UPDATE_SSH_PORT: ${{ secrets.COMPANY_UPDATE_SSH_PORT }}
          COMPANY_UPDATE_SSH_USER: ${{ secrets.COMPANY_UPDATE_SSH_USER }}
          COMPANY_UPDATE_SSH_PRIVATE_KEY: ${{ secrets.COMPANY_UPDATE_SSH_PRIVATE_KEY }}
          COMPANY_UPDATE_FEED_ROOT: ${{ vars.COMPANY_UPDATE_FEED_ROOT }}
          PRIVATE_UPDATE_APP_SLUG: container_audit
          PRIVATE_UPDATE_CHANNEL: stable
          PRIVATE_UPDATE_ZIP_PATH: Container_Audit-${{ github.ref_name }}.zip
          PRIVATE_UPDATE_MANIFEST_PATH: Container_Audit-${{ github.ref_name }}.manifest.json
        run: |
          $ErrorActionPreference = "Stop"
          foreach ($name in @("COMPANY_UPDATE_SSH_HOST", "COMPANY_UPDATE_SSH_USER", "COMPANY_UPDATE_SSH_PRIVATE_KEY")) {
            if ([string]::IsNullOrWhiteSpace((Get-Item "Env:$name").Value)) {
              throw "$name secret is required."
            }
          }
          $port = if ([string]::IsNullOrWhiteSpace($env:COMPANY_UPDATE_SSH_PORT)) { "22" } else { $env:COMPANY_UPDATE_SSH_PORT.Trim() }
          $feedRoot = if ([string]::IsNullOrWhiteSpace($env:COMPANY_UPDATE_FEED_ROOT)) { "/root/WorkerAnalysisGUI-web/static/update-feed" } else { $env:COMPANY_UPDATE_FEED_ROOT.Trim().TrimEnd("/") }
          $appSlug = $env:PRIVATE_UPDATE_APP_SLUG
          $channel = $env:PRIVATE_UPDATE_CHANNEL
          $zipPath = $env:PRIVATE_UPDATE_ZIP_PATH
          $manifestPath = $env:PRIVATE_UPDATE_MANIFEST_PATH
          $manifestSigPath = "$manifestPath.sig"
          foreach ($path in @($zipPath, "$zipPath.sha256", $manifestPath, $manifestSigPath)) {
            if (-not (Test-Path -LiteralPath $path)) {
              throw "Required private update publish file is missing: $path"
            }
          }

          $sshDir = Join-Path $env:RUNNER_TEMP "kmtech-update-ssh"
          New-Item -ItemType Directory -Force -Path $sshDir | Out-Null
          $keyPath = Join-Path $sshDir "id_ed25519"
          [System.IO.File]::WriteAllText($keyPath, $env:COMPANY_UPDATE_SSH_PRIVATE_KEY.Replace("`r`n", "`n"))
          icacls $keyPath /inheritance:r | Out-Null
          icacls $keyPath /grant:r "$($env:USERNAME):R" | Out-Null

          $target = "$($env:COMPANY_UPDATE_SSH_USER)@$($env:COMPANY_UPDATE_SSH_HOST)"
          $remoteArtifacts = "$feedRoot/artifacts/$appSlug"
          $remoteChannel = "$feedRoot/channels/$appSlug/$channel"
          $sshArgs = @("-i", $keyPath, "-p", $port, "-o", "StrictHostKeyChecking=accept-new", $target)
          & ssh @sshArgs "mkdir -p '$remoteArtifacts' '$remoteChannel'"
          if ($LASTEXITCODE -ne 0) { throw "Failed to create private update feed directories." }

          & scp -i $keyPath -P $port -o StrictHostKeyChecking=accept-new $zipPath "$zipPath.sha256" "${target}:$remoteArtifacts/"
          if ($LASTEXITCODE -ne 0) { throw "Failed to upload private update artifact files." }
          & scp -i $keyPath -P $port -o StrictHostKeyChecking=accept-new $manifestPath "${target}:$remoteChannel/latest.json.tmp"
          if ($LASTEXITCODE -ne 0) { throw "Failed to upload private update manifest." }
          & scp -i $keyPath -P $port -o StrictHostKeyChecking=accept-new $manifestSigPath "${target}:$remoteChannel/latest.json.sig.tmp"
          if ($LASTEXITCODE -ne 0) { throw "Failed to upload private update manifest signature." }
          & ssh @sshArgs "mv -f '$remoteChannel/latest.json.tmp' '$remoteChannel/latest.json' && mv -f '$remoteChannel/latest.json.sig.tmp' '$remoteChannel/latest.json.sig'"
          if ($LASTEXITCODE -ne 0) { throw "Failed to publish private update channel files." }

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          files: |
            Container_Audit-${{ github.ref_name }}.zip
            Container_Audit-${{ github.ref_name }}.zip.sha256
          name: "Release ${{ github.ref_name }}"
          body: "New release version ${{ github.ref_name }}"
          draft: false
          prerelease: false
