name: Create GitHub Release for Container_Audit

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Compile Python sources
        run: python -m compileall -q .

      - name: Run tests
        run: python -m pytest -q -p no:cacheprovider

      - name: Check release version
        run: python tools/check_release_version.py --tag "${{ github.ref_name }}"

      - name: Prepare release config
        shell: pwsh
        run: |
          Remove-Item -LiteralPath build/release_config -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path build/release_config | Out-Null
          Copy-Item -LiteralPath config/container_audit_settings.json -Destination build/release_config/container_audit_settings.json
          python tools/check_release_config.py --config-dir build/release_config

      - name: Prepare release tools
        shell: pwsh
        run: |
          Remove-Item -LiteralPath build/release_tools -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path build/release_tools | Out-Null
          Copy-Item -LiteralPath tools/direct_sync_relay_runner.py -Destination build/release_tools/direct_sync_relay_runner.py
          Copy-Item -LiteralPath tools/direct_sync_relay_install_pack.py -Destination build/release_tools/direct_sync_relay_install_pack.py
          Copy-Item -LiteralPath tools/direct_sync_relay_operator.py -Destination build/release_tools/direct_sync_relay_operator.py
          Copy-Item -LiteralPath tools/register_container_audit_worker_pc.py -Destination build/release_tools/register_container_audit_worker_pc.py

      - name: Build with PyInstaller (One-Folder mode)
        # 아이콘 지정 및 hidden-import 옵션을 포함한 최종 명령어
        run: python -m PyInstaller --name "Container_Audit" --onedir --windowed --contents-directory "." --icon="assets/logo.ico" --add-data "assets;assets" --add-data "build/release_config;config" --add-data "build/release_tools;tools" --add-data "direct_sync_push.py;." --add-data "direct_sync_runtime.py;." --add-data "direct_sync_operator.py;." --add-data "storage_policy.py;." --add-data "storage_utils.py;." --hidden-import pygame --hidden-import PIL.Image --hidden-import PIL.ImageTk Container_Audit.py

      - name: Build bundled direct-sync relay executable
        run: python -m PyInstaller --name "Container_Audit_DirectSync_Relay" --onefile --console --distpath dist/Container_Audit --workpath build/direct_sync_relay_pyinstaller --specpath build/direct_sync_relay_pyinstaller tools/direct_sync_relay_runner.py

      - name: Build bundled direct-sync install executable
        run: python -m PyInstaller --name "Container_Audit_DirectSync_Install" --onefile --console --distpath dist/Container_Audit --workpath build/direct_sync_install_pyinstaller --specpath build/direct_sync_install_pyinstaller tools/direct_sync_relay_install_pack.py

      - name: Build bundled worker-PC registration executable
        run: python -m PyInstaller --name "Container_Audit_Worker_PC_Register" --onefile --console --distpath dist/Container_Audit --workpath build/worker_pc_register_pyinstaller --specpath build/worker_pc_register_pyinstaller tools/register_container_audit_worker_pc.py

      - name: Zip the build folder
        run: |
          Compress-Archive -Path dist/Container_Audit -DestinationPath "Container_Audit-${{ github.ref_name }}.zip"

      - name: Smoke check release archive
        shell: pwsh
        run: |
          $zipPath = "Container_Audit-${{ github.ref_name }}.zip"
          $smokeDir = Join-Path $env:RUNNER_TEMP "container-audit-release-smoke"
          Remove-Item -LiteralPath $smokeDir -Recurse -Force -ErrorAction SilentlyContinue
          python tools/check_update_archive.py --zip-path "$zipPath" --destination "$smokeDir"
          $required = @(
            "Container_Audit/Container_Audit.exe",
            "Container_Audit/assets/Item.csv",
            "Container_Audit/assets/logo.ico",
            "Container_Audit/assets/logo.png",
            "Container_Audit/assets/success.wav",
            "Container_Audit/assets/error.wav",
            "Container_Audit/assets/KMC_LHD.png",
            "Container_Audit/assets/KMC_RHD.png",
            "Container_Audit/assets/HMC_LHD_RHD.png",
            "Container_Audit/config/container_audit_settings.json",
            "Container_Audit/tools/direct_sync_relay_runner.py",
            "Container_Audit/tools/direct_sync_relay_install_pack.py",
            "Container_Audit/tools/direct_sync_relay_operator.py",
            "Container_Audit/tools/register_container_audit_worker_pc.py",
            "Container_Audit/Container_Audit_DirectSync_Install.exe",
            "Container_Audit/Container_Audit_DirectSync_Relay.exe",
            "Container_Audit/Container_Audit_Worker_PC_Register.exe",
            "Container_Audit/direct_sync_push.py",
            "Container_Audit/direct_sync_runtime.py",
            "Container_Audit/direct_sync_operator.py",
            "Container_Audit/storage_policy.py",
            "Container_Audit/storage_utils.py"
          )
          foreach ($relative in $required) {
            $candidate = Join-Path $smokeDir $relative
            if (-not (Test-Path -LiteralPath $candidate)) {
              throw "Missing release asset: $relative"
            }
          }
          $releaseConfigDir = Join-Path $smokeDir "Container_Audit/config"
          python tools/check_release_config.py --config-dir "$releaseConfigDir"
          $hash = Get-FileHash -LiteralPath $zipPath -Algorithm SHA256
          "$($hash.Hash)  $zipPath" | Set-Content -LiteralPath "$zipPath.sha256" -Encoding ascii
      
      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          files: |
            Container_Audit-${{ github.ref_name }}.zip
            Container_Audit-${{ github.ref_name }}.zip.sha256
          name: "Release ${{ github.ref_name }}"
          body: "New release version ${{ github.ref_name }}"
          draft: false
          prerelease: false
